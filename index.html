<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trader - Professional Dashboard</title>
    
    <!-- React & ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (CDN) for parsing JSX in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        /* Animation */
        @keyframes progress { 
            0% { width: 0%; } 
            100% { width: 100%; } 
        }
        .animate-progress { 
            animation: progress 1.2s ease-out forwards; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 1. Icons Definition (Replaces lucide-react import) ---
        // 모든 아이콘을 직접 SVG 컴포넌트로 정의하여 스크립트 에러 방지
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const Search = (p) => <IconBase {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>;
        const TrendingUp = (p) => <IconBase {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></IconBase>;
        const TrendingDown = (p) => <IconBase {...p}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></IconBase>;
        const Info = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></IconBase>;
        const AlertTriangle = (p) => <IconBase {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></IconBase>;
        const ArrowUpRight = (p) => <IconBase {...p}><path d="M7 7h10v10"/><path d="M7 17 17 7"/></IconBase>;
        const ArrowDownRight = (p) => <IconBase {...p}><path d="m7 7 10 10"/><path d="M17 7v10H7"/></IconBase>;
        const ChevronDown = (p) => <IconBase {...p}><path d="m6 9 6 6 6-6"/></IconBase>;
        const Plus = (p) => <IconBase {...p}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const X = (p) => <IconBase {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
        const RefreshCw = (p) => <IconBase {...p}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></IconBase>;
        const LayoutDashboard = (p) => <IconBase {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconBase>;
        const PieChart = (p) => <IconBase {...p}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></IconBase>;
        const Settings = (p) => <IconBase {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l.22-.39a2 2 0 0 0-.73-2.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const Bell = (p) => <IconBase {...p}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></IconBase>;
        const Star = (p) => <IconBase {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>;


        // --- 2. Data & Logic ---

        const MOCK_KRX_MASTER_DATA = [
            { name: '삼성전자', code: '005930', market: 'KOSPI' },
            { name: 'SK하이닉스', code: '000660', market: 'KOSPI' },
            { name: '대주전자재료', code: '078600', market: 'KOSDAQ' },
            { name: '이오테크닉스', code: '039030', market: 'KOSDAQ' },
            { name: '한미반도체', code: '042700', market: 'KOSPI' },
            { name: 'LG에너지솔루션', code: '373220', market: 'KOSPI' },
            { name: '에코프로비엠', code: '247540', market: 'KOSDAQ' },
            { name: '셀트리온', code: '068270', market: 'KOSPI' },
            { name: '현대차', code: '005380', market: 'KOSPI' },
            { name: '기아', code: '000270', market: 'KOSPI' },
            { name: '포스코홀딩스', code: '005490', market: 'KOSPI' },
            { name: 'NAVER', code: '035420', market: 'KOSPI' },
            { name: '카카오', code: '035720', market: 'KOSPI' },
            { name: '삼성바이오로직스', code: '207940', market: 'KOSPI' },
            { name: '신한지주', code: '055550', market: 'KOSPI' },
            { name: 'KB금융', code: '105560', market: 'KOSPI' },
            { name: '알테오젠', code: '196170', market: 'KOSDAQ' },
            { name: 'HLB', code: '028300', market: 'KOSDAQ' },
            { name: '엔켐', code: '348370', market: 'KOSDAQ' },
            { name: '리노공업', code: '058470', market: 'KOSDAQ' },
            { name: 'HPSP', code: '403870', market: 'KOSDAQ' },
        ];

        const fetchStockDetail = (code) => {
            // 2026-02-17 기준 최신 가격 반영
            const latestMarketPrices = {
                '005930': { price: 181200, change: 2600, pct: 1.46 },  // 삼성전자
                '000660': { price: 215000, change: -1200, pct: -0.56 }, // SK하이닉스
                '078600': { price: 118400, change: 3200, pct: 2.78 },   // 대주전자재료
                '039030': { price: 204500, change: 4500, pct: 2.25 },   // 이오테크닉스
                '042700': { price: 168200, change: -1500, pct: -0.88 },  // 한미반도체
                '373220': { price: 412000, change: 5000, pct: 1.23 },   // LG에너지솔루션
                '247540': { price: 245000, change: 3500, pct: 1.45 },   // 에코프로비엠
                '068270': { price: 198000, change: 0, pct: 0.00 },      // 셀트리온
                '005380': { price: 255000, change: 5500, pct: 2.21 },   // 현대차
                '005490': { price: 420000, change: 12000, pct: 2.94 },  // 포스코홀딩스
            };

            return latestMarketPrices[code] || {
                price: Math.floor(Math.random() * 100000) + 25000,
                change: Math.floor((Math.random() - 0.5) * 4500),
                pct: parseFloat(((Math.random() - 0.5) * 5.2).toFixed(2))
            };
        };

        const generateMockData = (basePrice) => {
            const data = [];
            let currentPrice = basePrice * 0.95;
            const now = new Date('2026-02-17');

            for (let i = 29; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                const volatility = basePrice * 0.022;
                const dayChange = (Math.random() - 0.46) * volatility;
                const open = currentPrice;
                const close = i === 0 ? basePrice : open + dayChange;
                const high = Math.max(open, close) + Math.random() * (volatility * 0.4);
                const low = Math.min(open, close) - Math.random() * (volatility * 0.4);
                data.push({
                    date: date.toISOString().split('T')[0],
                    open, high, low, close,
                    isBullish: close > open
                });
                currentPrice = close;
            }
            return data;
        };

        // --- 3. App Component (Original Dashboard UX) ---

        const App = () => {
            const [masterStocks, setMasterStocks] = useState([]);
            const [myWatchlist, setMyWatchlist] = useState([]);
            const [selectedStock, setSelectedStock] = useState(null);
            const [chartData, setChartData] = useState([]);
            
            const [isLoading, setIsLoading] = useState(true);
            const [isSearchModalOpen, setIsSearchModalOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [syncTime, setSyncTime] = useState('');

            useEffect(() => {
                const syncWithKRX = async () => {
                    setIsLoading(true);
                    setTimeout(() => {
                        setMasterStocks(MOCK_KRX_MASTER_DATA);
                        const initialOnboard = MOCK_KRX_MASTER_DATA.slice(0, 5).map(s => ({
                            ...s, ...fetchStockDetail(s.code)
                        }));
                        setMyWatchlist(initialOnboard);
                        setSelectedStock(initialOnboard[0]);
                        setSyncTime(new Date().toLocaleTimeString());
                        setIsLoading(false);
                    }, 1000);
                };
                syncWithKRX();
            }, []);

            useEffect(() => {
                if (selectedStock) {
                    setChartData(generateMockData(selectedStock.price));
                }
            }, [selectedStock]);

            const calculateMA = (data, period) => {
                return data.map((val, idx) => {
                    if (idx < period - 1) return null;
                    const slice = data.slice(idx - period + 1, idx + 1);
                    const sum = slice.reduce((acc, curr) => acc + curr.close, 0);
                    return sum / period;
                });
            };

            const ma5 = useMemo(() => calculateMA(chartData, 5), [chartData]);
            const ma10 = useMemo(() => calculateMA(chartData, 10), [chartData]);
            const ma20 = useMemo(() => calculateMA(chartData, 20), [chartData]);

            const analysis = useMemo(() => {
                if (chartData.length < 3) return { trend: '분석중', pattern: '수집중' };
                const last = chartData[chartData.length - 1];
                const prev = chartData[chartData.length - 2];
                
                if (!prev.isBullish && last.isBullish && last.open <= prev.close && last.close >= prev.open) {
                    return { 
                        trend: '상승세 초입', pattern: '상승장악형 (Bullish Engulfing)', 
                        signal: '매수', desc: '바닥권에서 양봉이 직전 음봉의 몸통을 완전히 감싸 안으며 강력한 반전 시그널을 형성했습니다.' 
                    };
                }
                const bodySize = Math.abs(last.close - last.open);
                const lowerShadow = last.isBullish ? last.open - last.low : last.close - last.low;
                if (lowerShadow > bodySize * 2 && (last.high - Math.max(last.open, last.close)) < bodySize * 0.5) {
                    return { 
                        trend: '상승 반전 예고', pattern: '망치형 (Hammer)', 
                        signal: '매수 대기', desc: '저가권에서 강력한 저점 매수세가 유입되었습니다. 익일 시가 돌파 시 추세 전환이 확정됩니다.' 
                    };
                }
                return { trend: '추세 유지', pattern: '중립형', signal: '보유/관망', desc: '현재 뚜렷한 반전 패턴은 보이지 않으나, 이동평균선의 지지 여부를 체크하며 보유 전략을 유지하십시오.' };
            }, [chartData]);

            const handleAddStock = (stock) => {
                const existing = myWatchlist.find(s => s.code === stock.code);
                if (!existing) {
                    const details = fetchStockDetail(stock.code);
                    const integratedStock = { ...stock, ...details };
                    setMyWatchlist([integratedStock, ...myWatchlist]);
                    setSelectedStock(integratedStock);
                } else {
                    setSelectedStock(existing);
                }
                setIsSearchModalOpen(false);
                setSearchQuery('');
            };

            const filteredSearch = masterStocks.filter(s => 
                s.name.includes(searchQuery) || s.code.includes(searchQuery)
            );

            if (isLoading || !selectedStock) {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-blue-400 p-8">
                        <RefreshCw className="w-16 h-16 animate-spin mb-6 text-blue-500" />
                        <h2 className="text-3xl font-black tracking-tighter uppercase italic">KRX Master Syncing</h2>
                        <p className="text-slate-500 text-sm mt-4 font-bold">Step 1: 마스터 데이터 확보 및 동기화 중...</p>
                        <div className="mt-8 w-64 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                            <div className="h-full bg-blue-600 animate-progress"></div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex min-h-screen bg-slate-50 font-sans text-slate-900">
                    
                    {/* Sidebar */}
                    <aside className={`${sidebarOpen ? 'w-80' : 'w-24'} bg-white border-r border-slate-200 transition-all duration-500 flex flex-col z-40 shadow-2xl`}>
                        <div className="p-8 border-b border-slate-100 flex items-center justify-between bg-white sticky top-0">
                            <div className={`flex items-center gap-4 ${!sidebarOpen && 'hidden'}`}>
                                <div className="bg-indigo-600 p-2.5 rounded-[1rem] shadow-lg shadow-indigo-200">
                                    <TrendingUp className="text-white w-6 h-6" />
                                </div>
                                <h1 className="font-black text-2xl tracking-tighter text-slate-800">AI TRADER</h1>
                            </div>
                            <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2.5 hover:bg-slate-100 rounded-xl transition-colors">
                                <LayoutDashboard className="w-6 h-6 text-slate-400" />
                            </button>
                        </div>

                        <nav className="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                            <button 
                                onClick={() => setIsSearchModalOpen(true)}
                                className={`w-full flex items-center gap-4 bg-indigo-600 text-white p-5 rounded-[1.5rem] hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100 active:scale-95 group ${!sidebarOpen && 'justify-center p-4'}`}
                            >
                                <Plus className="w-7 h-7 flex-shrink-0 group-hover:rotate-90 transition-transform" />
                                {sidebarOpen && <span className="font-black text-lg tracking-tight">신규 종목 추가</span>}
                            </button>

                            <div className={`pt-6 ${!sidebarOpen && 'hidden'}`}>
                                <div className="flex items-center justify-between px-2 mb-6">
                                    <p className="text-[11px] font-black text-slate-400 uppercase tracking-[0.25em]">마이 워치리스트</p>
                                    <Star className="w-4 h-4 text-amber-400 fill-amber-400" />
                                </div>
                                <div className="space-y-2">
                                    {myWatchlist.map(stock => (
                                        <button
                                            key={stock.code}
                                            onClick={() => setSelectedStock(stock)}
                                            className={`w-full flex items-center justify-between p-5 rounded-[1.5rem] transition-all border-2 ${selectedStock.code === stock.code ? 'bg-indigo-50 border-indigo-200 shadow-md' : 'hover:bg-slate-50 border-transparent'}`}
                                        >
                                            <div className="text-left overflow-hidden">
                                                <p className={`font-black truncate text-base ${selectedStock.code === stock.code ? 'text-indigo-700' : 'text-slate-800'}`}>{stock.name}</p>
                                                <p className="text-[10px] text-slate-400 font-bold tracking-tighter uppercase">{stock.market} | {stock.code}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="font-black text-sm">{stock.price.toLocaleString()}원</p>
                                                <p className={`text-[10px] font-black ${stock.change >= 0 ? 'text-red-500' : 'text-blue-500'}`}>
                                                    {stock.change >= 0 ? '▲' : '▼'}{Math.abs(stock.pct)}%
                                                </p>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </nav>

                        <div className="p-8 border-t border-slate-100 bg-slate-50/30">
                            <div className={`flex items-center gap-5 ${!sidebarOpen && 'justify-center'}`}>
                                <div className="w-12 h-12 bg-indigo-100 rounded-2xl border-2 border-white flex items-center justify-center font-black text-indigo-600 shadow-sm text-lg">AI</div>
                                {sidebarOpen && (
                                    <div className="overflow-hidden">
                                        <p className="font-black text-sm text-slate-800 truncate">분석 코어 V3.5</p>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Sync: {syncTime}</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </aside>

                    {/* Main Analysis */}
                    <main className="flex-1 flex flex-col overflow-hidden relative">
                        {/* Header */}
                        <header className="bg-white border-b border-slate-200 px-12 py-10 flex flex-col md:flex-row md:items-center justify-between gap-8 shadow-sm z-30">
                            <div>
                                <div className="flex items-center gap-4 mb-3">
                                    <span className="bg-slate-900 text-white text-[9px] px-2.5 py-1 rounded-full font-black uppercase tracking-widest">{selectedStock.market}</span>
                                    <span className="text-slate-400 text-xs font-bold font-mono tracking-widest">{selectedStock.code}</span>
                                </div>
                                <h2 className="text-6xl font-black text-slate-900 tracking-tighter">{selectedStock.name}</h2>
                            </div>

                            <div className="flex items-center gap-14">
                                <div className="text-right">
                                    <p className="text-[11px] text-slate-400 font-black uppercase tracking-[0.25em] mb-3">현재가 (2026-02-17)</p>
                                    <div className="flex items-end justify-end gap-5">
                                        <span className="text-6xl font-black tracking-tighter text-slate-900 leading-none">{selectedStock.price.toLocaleString()}원</span>
                                        <div className={`flex items-center font-black text-2xl mb-1 ${selectedStock.change >= 0 ? 'text-red-500' : 'text-blue-500'}`}>
                                            {selectedStock.change >= 0 ? <ArrowUpRight className="w-8 h-8" /> : <ArrowDownRight className="w-8 h-8" />}
                                            {Math.abs(selectedStock.change).toLocaleString()} ({selectedStock.pct}%)
                                        </div>
                                    </div>
                                </div>
                                <div className="hidden lg:flex items-center gap-4 pl-14 border-l border-slate-200">
                                    <button className="p-5 bg-slate-50 rounded-[1.5rem] hover:bg-slate-100 transition-all shadow-inner border border-slate-100">
                                        <Bell className="w-7 h-7 text-slate-400" />
                                    </button>
                                    <button className="p-5 bg-slate-50 rounded-[1.5rem] hover:bg-slate-100 transition-all shadow-inner border border-slate-100">
                                        <Settings className="w-7 h-7 text-slate-400" />
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* Content */}
                        <div className="flex-1 overflow-y-auto p-12 space-y-12 custom-scrollbar">
                            
                            {/* Chart */}
                            <section className="bg-white p-12 rounded-[3.5rem] border border-slate-200 shadow-sm relative">
                                <div className="flex flex-col md:flex-row items-center justify-between mb-14 gap-6">
                                    <div className="flex items-center gap-5">
                                        <div className="p-4 bg-indigo-50 rounded-[1.25rem]">
                                            <TrendingUp className="w-8 h-8 text-indigo-600" />
                                        </div>
                                        <div>
                                            <h3 className="font-black text-2xl text-slate-900">기술적 추세 차트</h3>
                                            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Candle & MA Analysis</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-8 text-[11px] font-black uppercase tracking-[0.2em] bg-slate-50 px-8 py-4 rounded-3xl border border-slate-100 shadow-inner">
                                        <span className="flex items-center gap-3"><div className="w-8 h-2 bg-black rounded-full"></div> 5일선</span>
                                        <span className="flex items-center gap-3"><div className="w-8 h-2 bg-blue-500 rounded-full"></div> 10일선</span>
                                        <span className="flex items-center gap-3"><div className="w-8 h-2 bg-orange-500 rounded-full"></div> 20일선</span>
                                    </div>
                                </div>

                                <div className="w-full h-[500px] bg-slate-50 rounded-[3rem] relative border border-slate-100 flex items-end px-12 py-14 shadow-inner">
                                    {chartData.map((d, i) => {
                                        const maxH = Math.max(...chartData.map(x => x.high));
                                        const minL = Math.min(...chartData.map(x => x.low));
                                        const range = maxH - minL;
                                        const getY = (price) => ((maxH - price) / range) * 100;

                                        return (
                                            <div key={i} className="flex-1 flex flex-col items-center group relative h-full">
                                                <div className="absolute w-[2px] bg-slate-300 z-0" style={{ top: `${getY(d.high)}%`, bottom: `${100 - getY(d.low)}%` }}></div>
                                                <div 
                                                    className={`w-[75%] z-10 rounded-sm shadow-xl transition-all duration-300 ${d.isBullish ? 'bg-red-500' : 'bg-blue-600'}`}
                                                    style={{ top: `${getY(Math.max(d.open, d.close))}%`, bottom: `${100 - getY(Math.min(d.open, d.close))}%` }}
                                                ></div>
                                                {ma5[i] && <div className="absolute w-2.5 h-2.5 bg-black rounded-full z-20 border-2 border-white shadow-md" style={{ top: `${getY(ma5[i])}%` }}></div>}
                                                {ma10[i] && <div className="absolute w-2.5 h-2.5 bg-blue-500 rounded-full z-20 border-2 border-white shadow-md" style={{ top: `${getY(ma10[i])}%` }}></div>}
                                                {ma20[i] && <div className="absolute w-2.5 h-2.5 bg-orange-500 rounded-full z-20 border-2 border-white shadow-md" style={{ top: `${getY(ma20[i])}%` }}></div>}
                                                
                                                <div className="hidden group-hover:block absolute -top-28 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[10px] p-6 rounded-3xl shadow-2xl z-50 border border-slate-700 min-w-[160px]">
                                                    <p className="font-black text-indigo-400 mb-3 border-b border-slate-700 pb-3 uppercase tracking-widest">{d.date}</p>
                                                    <div className="space-y-1">
                                                        <p className="flex justify-between font-bold">종가: <span>{Math.round(d.close).toLocaleString()}원</span></p>
                                                        <p className="flex justify-between opacity-80">MA20: <span>{ma20[i] ? Math.round(ma20[i]).toLocaleString() : '-'}</span></p>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>

                            {/* AI Banner */}
                            <div className="bg-slate-900 rounded-[3.5rem] p-14 flex flex-col lg:flex-row lg:items-center justify-between gap-12 shadow-2xl border border-slate-800">
                                <div className="flex items-center gap-10">
                                    <div className="p-8 bg-indigo-600 rounded-[2.5rem] shadow-2xl shadow-indigo-500/30">
                                        <PieChart className="w-14 h-14 text-white" />
                                    </div>
                                    <div>
                                        <p className="text-indigo-400 text-xs font-black uppercase tracking-[0.5em] mb-4 italic">AI Core Diagnostic Engine</p>
                                        <h4 className="text-5xl font-black text-white leading-tight tracking-tighter">
                                            {selectedStock.name} 추세 <span className="text-indigo-400">[{analysis.trend}]</span>
                                        </h4>
                                    </div>
                                </div>
                                <div className="flex flex-col items-start lg:items-end">
                                    <p className="text-[11px] text-slate-500 font-black uppercase tracking-[0.2em] mb-5">Detected Pattern</p>
                                    <div className="bg-slate-800 px-12 py-6 rounded-[2rem] border-2 border-slate-700 font-black text-2xl text-slate-200 shadow-inner italic">
                                        {analysis.pattern}
                                    </div>
                                </div>
                            </div>

                            {/* Reports */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                {/* Buy Report */}
                                <article className="bg-white rounded-[4rem] p-14 border border-slate-200 shadow-sm hover:shadow-2xl transition-all group overflow-hidden relative">
                                    <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:opacity-10 transition-opacity">
                                        <ArrowUpRight className="w-56 h-56 text-red-600" />
                                    </div>
                                    <div className="flex items-center justify-between mb-12 pb-10 border-b border-slate-50 relative">
                                        <h4 className="text-red-700 font-black text-4xl flex items-center gap-5 tracking-tighter">
                                            <ArrowUpRight className="w-12 h-12" /> 매수 리포트
                                        </h4>
                                        <div className="px-6 py-2.5 bg-red-100 text-red-600 rounded-full text-[12px] font-black uppercase tracking-widest">Buy Zone</div>
                                    </div>
                                    <div className="space-y-12 relative">
                                        <div className="flex justify-between items-end">
                                            <div>
                                                <p className="text-xs text-slate-400 font-black uppercase tracking-[0.2em] mb-4">권장 진입가</p>
                                                <p className="text-6xl font-black text-red-600 tracking-tighter">{Math.round(selectedStock.price * 1.0015).toLocaleString()}원</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-xs text-slate-400 font-black uppercase tracking-[0.2em] mb-4">예상 시점</p>
                                                <p className="text-2xl font-black text-slate-800 underline decoration-red-200 underline-offset-[12px] italic">2026-02-18 Open</p>
                                            </div>
                                        </div>
                                        <div className="p-10 bg-slate-50 rounded-[3rem] border border-slate-100 shadow-inner">
                                            <h5 className="text-[12px] font-black text-slate-400 mb-5 flex items-center gap-4 uppercase tracking-[0.4em]">
                                                <Info className="w-6 h-6 text-indigo-500" /> 패턴 분석 근거
                                            </h5>
                                            <p className="text-lg text-slate-700 leading-relaxed font-black italic opacity-90">
                                                "{analysis.desc}"
                                            </p>
                                        </div>
                                    </div>
                                </article>

                                {/* Sell Report */}
                                <article className="bg-white rounded-[4rem] p-14 border border-slate-200 shadow-sm hover:shadow-2xl transition-all group overflow-hidden relative">
                                    <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:opacity-10 transition-opacity">
                                        <ArrowDownRight className="w-56 h-56 text-indigo-600" />
                                    </div>
                                    <div className="flex items-center justify-between mb-12 pb-10 border-b border-slate-50 relative">
                                        <h4 className="text-indigo-700 font-black text-4xl flex items-center gap-5 tracking-tighter">
                                            <ArrowDownRight className="w-12 h-12" /> 매도 리포트
                                        </h4>
                                        <div className="px-6 py-2.5 bg-indigo-100 text-indigo-600 rounded-full text-[12px] font-black uppercase tracking-widest">Exit Zone</div>
                                    </div>
                                    <div className="space-y-12 relative">
                                        <div className="flex justify-between items-end">
                                            <div>
                                                <p className="text-xs text-slate-400 font-black uppercase tracking-[0.2em] mb-4">1차 익절가</p>
                                                <p className="text-6xl font-black text-indigo-600 tracking-tighter">{Math.round(selectedStock.price * 1.135).toLocaleString()}원</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-xs text-slate-400 font-black uppercase tracking-[0.2em] mb-4">리스크 관리</p>
                                                <p className="text-2xl font-black text-slate-800 underline decoration-indigo-200 underline-offset-[12px] italic">MA5 이탈 시</p>
                                            </div>
                                        </div>
                                        <div className="p-10 bg-slate-50 rounded-[3rem] border border-slate-100 shadow-inner">
                                            <h5 className="text-[12px] font-black text-slate-400 mb-5 flex items-center gap-4 uppercase tracking-[0.4em]">
                                                <AlertTriangle className="w-6 h-6 text-amber-500" /> 수익 보존 가이드
                                            </h5>
                                            <p className="text-lg text-slate-700 leading-relaxed font-black">
                                                상단 저항선 부근에서 유성형 패턴이 발견되거나, 5일선(검정색)을 하향 이탈할 경우 비중 축소 및 수익 실현을 강력히 권장합니다.
                                            </p>
                                        </div>
                                    </div>
                                </article>
                            </div>

                            <footer className="bg-slate-800 p-14 rounded-[4rem] text-xs text-slate-500 flex flex-col md:flex-row gap-16 border border-slate-700 shadow-inner">
                                <div className="flex-1 space-y-8">
                                    <div className="flex items-center gap-5 text-amber-500 font-black uppercase tracking-[0.5em]">
                                        <AlertTriangle className="w-8 h-8" /> 투자 유의사항
                                    </div>
                                    <p className="leading-loose text-slate-400 font-medium text-sm">본 분석은 KRX 시뮬레이션 데이터를 기반으로 한 AI 추정치입니다. 과거의 패턴이 미래의 수익을 보장하지 않으므로, 실제 투자는 기업 가치와 시장 상황을 종합적으로 고려하여 신중히 결정하시기 바랍니다.</p>
                                </div>
                                <div className="flex-shrink-0 space-y-4 min-w-[240px]">
                                    <p className="font-black text-slate-300 uppercase tracking-widest border-b border-slate-700 pb-3 mb-2">Master Database Status</p>
                                    <div className="space-y-2 opacity-80">
                                        <p className="font-mono text-[11px] text-indigo-400 flex justify-between">Sync Date: <span>2026-02-17</span></p>
                                        <p className="font-mono text-[11px] flex justify-between text-slate-400">Time: <span>15:30 (Market Close)</span></p>
                                        <p className="font-mono text-[11px] flex justify-between text-slate-400">Master List: <span>v3.5.0-R</span></p>
                                    </div>
                                </div>
                            </footer>
                        </div>
                    </main>

                    {/* New Stock Search Modal */}
                    {isSearchModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-3xl z-[100] flex items-center justify-center p-8">
                            <div className="bg-white w-full max-w-3xl rounded-[4.5rem] shadow-2xl overflow-hidden animate-in zoom-in-95 duration-500">
                                <div className="p-14 border-b border-slate-50 flex items-center justify-between bg-slate-50/50">
                                    <div className="flex items-center gap-6">
                                        <div className="bg-indigo-600 p-5 rounded-[2rem] shadow-2xl shadow-indigo-200">
                                            <Search size={40} className="text-white" />
                                        </div>
                                        <h2 className="font-black text-5xl text-slate-900 tracking-tighter">종목 추가 (KRX)</h2>
                                    </div>
                                    <button onClick={() => setIsSearchModalOpen(false)} className="p-5 hover:bg-slate-200 rounded-full transition-all text-slate-400">
                                        <X size={48} />
                                    </button>
                                </div>
                                <div className="p-14">
                                    <div className="relative mb-14 group">
                                        <div className="absolute left-10 top-8.5 w-10 h-10 text-slate-300 group-focus-within:text-indigo-600 transition-colors">
                                            <Search size={40} />
                                        </div>
                                        <input 
                                            autoFocus
                                            type="text" 
                                            placeholder="대주전자재료, 한미반도체, 이오테크닉스 등 검색..."
                                            className="w-full pl-24 pr-12 py-10 bg-slate-100 rounded-[3rem] font-black text-3xl focus:outline-none focus:ring-[12px] focus:ring-indigo-600/10 border-none transition-all placeholder:text-slate-300"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                        />
                                    </div>
                                    <div className="space-y-5 max-h-[500px] overflow-y-auto pr-8 custom-scrollbar">
                                        {filteredSearch.length > 0 ? filteredSearch.map(stock => (
                                            <button
                                                key={stock.code}
                                                onClick={() => handleAddStock(stock)}
                                                className="w-full flex items-center justify-between p-10 bg-slate-50 hover:bg-indigo-600 hover:text-white rounded-[3rem] transition-all group shadow-sm hover:shadow-2xl hover:shadow-indigo-500/40 border border-transparent"
                                            >
                                                <div className="text-left">
                                                    <p className="font-black text-3xl tracking-tight mb-1">{stock.name}</p>
                                                    <p className="text-sm font-bold opacity-60 uppercase tracking-[0.3em]">{stock.market} | {stock.code}</p>
                                                </div>
                                                <div className="flex items-center gap-10">
                                                    <div className="w-20 h-20 rounded-full border-4 border-indigo-100 flex items-center justify-center group-hover:border-white transition-colors">
                                                        <Plus size={48} className="text-indigo-400 group-hover:text-white transition-transform group-hover:rotate-90" />
                                                    </div>
                                                </div>
                                            </button>
                                        )) : (
                                            <div className="py-32 text-center text-slate-300 font-black italic text-3xl tracking-tighter">
                                                검색 결과가 없습니다.
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
