name: Sync Brunch Posts

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# 💡 로그에 찍힌 안내대로 Node 24 환경을 강제하여 경고 메시지를 완전히 제거합니다.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install axios@1.15.1 cheerio@1.0.0-rc.12

      - name: Run Brunch Scraper
        run: node update-brunch.js

      - name: Commit and Push if Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 💡 [핵심 변경] 특정 폴더 지정 대신 전체 경로('.')를 지정합니다.
          # 이렇게 하면 새 글이 없어서 폴더가 비어있어도 128 에러를 내지 않고 유연하게 넘어갑니다.
          git add .
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: 브런치 새 글 자동 동기화"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main
          else
            echo "새로 등록된 글이 없습니다. 안전하게 종료합니다."
          fi
