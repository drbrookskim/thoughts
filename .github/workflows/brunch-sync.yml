name: Sync Brunch Posts

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # 💡 동기화 오류를 막기 위해 전체 이력을 가져옵니다.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper and Rebuild Static Site
        run: |
          python brunch_scraper.py --start-id 164 --output-dir brunch_articles
          python build_static.py

      - name: Commit and Push if Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: 브런치 새 글 자동 동기화"
            # 💡 푸시하기 직전에 한 번 더 최신 상태를 합쳐서(rebase) 충돌을 방지합니다.
            git pull --rebase origin main
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main
          else
            echo "새로 등록된 글이 없습니다. 안전하게 종료합니다."
          fi
