name: Sync Brunch Posts

on:
  schedule:
    - cron: '0 * * * *' # 매 시간 정각에 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

# 💡 Git 권한 에러(128)를 해결하기 위해 권한 범위를 명확히 명시합니다.
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 💡 128 에러 원천 차단: GITHUB_TOKEN을 명시적으로 주입하여 체크아웃합니다.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 💡 다음 달 강제 전환에 맞추어 Node.js 버전을 24로 선제 업그레이드합니다.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 💡 안전이 검증된 최신 버전 패키지 설치
      - name: Install Dependencies
        run: npm install axios@1.15.1 cheerio@1.0.0-rc.12

      - name: Run Brunch Scraper
        run: node update-brunch.js

      - name: Commit and Push if Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add thoughts/
          if ! git diff --cached --quiet; then
            git commit -m "chore: 브런치 새 글 자동 동기화"
            git push origin main
          else
            echo "새로 등록된 글이 없습니다."
          fi
