name: Sync Brunch Posts

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 💡 버전 고정 대신 일반 설치로 변경하여 설치 실패 확률을 없앱니다.
      # (NPM이 악성 버전을 이미 폐기했으므로 최신 버전은 안전합니다.)
      - name: Install Dependencies
        run: npm install axios cheerio

      - name: Run Brunch Scraper
        run: node update-brunch.js

      - name: Commit and Push if Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: 브런치 새 글 자동 동기화"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main
          else
            echo "새로 등록된 글이 없습니다. 안전하게 종료합니다."
          fi
