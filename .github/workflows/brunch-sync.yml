name: Sync Brunch Posts

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# 1. 가상 환경 자체에 명시적으로 쓰기 권한을 부여합니다.
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 2. 체크아웃할 때 토큰 인증을 거친 상태로 소스코드를 가져옵니다. (128 에러 원천 차단)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 3. 다음 달 강제 전환 규격에 맞추어 Node.js 24로 선제 대응합니다.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install axios@1.15.1 cheerio@1.0.0-rc.12

      - name: Run Brunch Scraper
        run: node update-brunch.js

      # 4. 푸시할 때 주입된 토큰 인증 정보를 주소에 직접 녹여서 강제로 밀어 넣습니다.
      - name: Commit and Push if Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add thoughts/
          if ! git diff --cached --quiet; then
            git commit -m "chore: 브런치 새 글 자동 동기화"
            # 💡 안전하게 인증된 원격 주소로 강제 푸시합니다.
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main
          else
            echo "새로 등록된 글이 없습니다."
          fi
