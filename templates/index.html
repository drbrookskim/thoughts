<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AliExpress Price Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AliExpress Price Tracker</h1>
            <p>Find the best deals across sellers</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Enter product name (e.g., 'iPhone 15 case')">
            <button id="searchBtn">Search</button>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Scraping AliExpress for best prices...</p>
        </div>

        <div id="results" class="results-grid">
            <!-- Results will appear here -->
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
